<style>
  :root {
    --bg: #0a0e1a;
    --panel: #0f1629;
    --panel2: #141c35;
    --border: #1e2d5a;
    --accent: #f7941d;
    --accent2: #00d4ff;
    --text: #e8eaf6;
    --text2: #7b8abf;
    --center-dot: #f7941d;
    --district-fill: #0d1830;
    --district-stroke: #1a2f5e;
    --state-stroke: #2a4080;
    --line-color: rgba(247,148,29,0.6);
    --green: #00e676;
    --red: #ff4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; overflow:hidden; }

  #app { display:flex; height:100vh; width:100vw; }

  /* SIDEBAR */
  #sidebar {
    width: 340px; min-width:320px; max-width:340px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display:flex; flex-direction:column;
    z-index:1000; overflow:hidden;
  }
  #sidebar-header {
    padding: 18px 20px 14px;
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-family:'Rajdhani',sans-serif;
    font-size:1.5rem; font-weight:700;
    color: var(--accent);
    letter-spacing:1px;
    line-height:1.1;
  }
  #sidebar-header p {
    font-size:0.72rem; color:var(--text2); margin-top:4px;
    letter-spacing:0.5px;
  }
  .stat-row {
    display:flex; gap:12px; margin-top:10px;
  }
  .stat {
    flex:1; background:var(--bg);
    border:1px solid var(--border);
    border-radius:6px; padding:8px 10px;
    text-align:center;
  }
  .stat-val { font-family:'Rajdhani',sans-serif; font-size:1.3rem; font-weight:700; color:var(--accent2); }
  .stat-lbl { font-size:0.62rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }

  /* SEARCH */
  #search-section { padding:14px 16px; border-bottom:1px solid var(--border); }
  #search-section label { font-size:0.7rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; display:block; margin-bottom:6px; }
  #city-search {
    width:100%; padding:9px 12px;
    background:var(--bg); border:1px solid var(--border);
    border-radius:6px; color:var(--text);
    font-family:'Inter',sans-serif; font-size:0.85rem;
    outline:none; transition:border-color 0.2s;
  }
  #city-search:focus { border-color:var(--accent2); }
  #city-search::placeholder { color:var(--text2); }
  #search-results {
    margin-top:6px; max-height:160px; overflow-y:auto;
    border:1px solid var(--border); border-radius:6px;
    background:var(--bg); display:none;
  }
  .search-item {
    padding:8px 12px; font-size:0.82rem; cursor:pointer;
    border-bottom:1px solid var(--border); transition:background 0.15s;
    display:flex; align-items:center; gap:8px;
  }
  .search-item:last-child { border-bottom:none; }
  .search-item:hover { background:var(--panel2); }
  .search-item .state-tag {
    font-size:0.65rem; color:var(--text2); background:var(--panel2);
    border:1px solid var(--border); padding:1px 5px; border-radius:3px;
    white-space:nowrap;
  }

  /* SELECTED CITY */
  #selected-city-section {
    padding:12px 16px; border-bottom:1px solid var(--border);
    display:none;
  }
  #selected-city-section label { font-size:0.7rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; display:block; margin-bottom:6px; }
  #selected-city-name {
    font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:600;
    color:var(--accent2);
  }
  #clear-city {
    font-size:0.7rem; color:var(--text2); cursor:pointer;
    text-decoration:underline; margin-left:8px;
  }
  #clear-city:hover { color:var(--red); }

  /* CENTERS LIST */
  #centers-section { flex:1; overflow-y:auto; padding:0; }
  #centers-header {
    padding:10px 16px 8px;
    background:var(--panel2);
    border-bottom:1px solid var(--border);
    font-size:0.7rem; color:var(--text2);
    text-transform:uppercase; letter-spacing:0.8px;
    position:sticky; top:0; z-index:2;
  }
  #centers-header span { color:var(--accent); font-weight:600; }

  .center-item {
    padding:9px 14px;
    border-bottom:1px solid rgba(30,45,90,0.5);
    cursor:pointer; transition:background 0.15s;
    display:flex; align-items:flex-start; gap:10px;
  }
  .center-item:hover { background:var(--panel2); }
  .center-item.highlighted { background:rgba(247,148,29,0.08); border-left:2px solid var(--accent); }
  .center-rank {
    font-family:'Rajdhani',sans-serif; font-size:0.85rem; font-weight:700;
    color:var(--accent); min-width:22px; padding-top:1px;
  }
  .center-rank.far { color:var(--text2); }
  .center-info { flex:1; }
  .center-name { font-size:0.82rem; font-weight:500; color:var(--text); line-height:1.3; }
  .center-state { font-size:0.68rem; color:var(--text2); margin-top:1px; }
  .center-dist {
    font-family:'Rajdhani',sans-serif; font-size:0.85rem;
    color:var(--accent2); font-weight:600; white-space:nowrap;
    padding-top:1px;
  }
  .center-dist.far { color:var(--text2); }

  /* FILTER BAR */
  #filter-bar {
    padding:8px 14px; border-bottom:1px solid var(--border);
    background:var(--panel2);
    display:flex; gap:6px; flex-wrap:wrap;
  }
  .filter-btn {
    padding:3px 9px; font-size:0.68rem; border-radius:12px;
    border:1px solid var(--border); background:transparent;
    color:var(--text2); cursor:pointer; transition:all 0.15s;
    font-family:'Inter',sans-serif;
  }
  .filter-btn:hover, .filter-btn.active {
    background:var(--accent); border-color:var(--accent); color:#000; font-weight:600;
  }

  /* MAP */
  #map-container { flex:1; position:relative; }
  #map { width:100%; height:100%; background:#060d1f; }

  /* MAP LEGEND */
  #legend {
    position:absolute; bottom:20px; right:16px;
    background:var(--panel); border:1px solid var(--border);
    border-radius:8px; padding:12px 14px; z-index:500;
    font-size:0.72rem; min-width:160px;
  }
  #legend h4 { font-family:'Rajdhani',sans-serif; font-size:0.85rem; color:var(--text2); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
  .legend-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; color:var(--text2); }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .legend-line { width:18px; height:2px; flex-shrink:0; }

  /* TOOLTIP */
  #tooltip {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--border);
    border-radius:6px; padding:8px 14px; z-index:600;
    font-size:0.78rem; color:var(--text2); pointer-events:none;
    display:none; text-align:center;
  }

  /* LOADING */
  #loading {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:9999;
  }
  #loading h2 {
    font-family:'Rajdhani',sans-serif; font-size:2rem;
    color:var(--accent); margin-bottom:8px; letter-spacing:2px;
  }
  #loading p { color:var(--text2); font-size:0.82rem; margin-bottom:24px; }
  .spinner {
    width:40px; height:40px;
    border:3px solid var(--border);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  #loading-bar-wrap { width:280px; height:3px; background:var(--border); border-radius:2px; margin-top:16px; }
  #loading-bar { height:100%; width:0%; background:var(--accent); border-radius:2px; transition:width 0.3s; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--accent2); }

  /* NE WARNING */
  .ne-warning {
    font-size:0.63rem; color:#ffb300;
    display:flex; align-items:center; gap:3px; margin-top:2px;
  }

  /* Mobile */
  @media (max-width:700px) {
    #sidebar { width:100%; max-width:100%; min-width:unset; position:absolute; bottom:0; z-index:1000; height:55vh; border-right:none; border-top:1px solid var(--border); }
    #app { flex-direction:column; }
    #map-container { height:45vh; }
  }
</style>
</head>

const NE_STATES_VIA_BANGLADESH = ["MANIPUR","MIZORAM","TRIPURA","NAGALAND","ARUNACHAL PRADESH","MEGHALAYA","ASSAM","SIKKIM"];
const REQUIRES_DETOUR_STATES = ["MANIPUR","MIZORAM","TRIPURA","NAGALAND"];

// Approximate distance penalty (km) for Bangladesh detour for certain NE states
function getBangladeshPenalty(fromState, toState) {
  if (REQUIRES_DETOUR_STATES.includes(toState) || REQUIRES_DETOUR_STATES.includes(fromState)) {
    return 350; // rough extra km going around Bangladesh
  }
  return 0;
}

// Haversine distance in km
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

let map, userMarker, connectionLines = [], centerMarkers = [];
let selectedCity = null;
let activeFilter = 'all';

function initMap() {
  map = L.map('map', {
    center: [22.5, 80],
    zoom: 5,
    zoomControl: true,
    attributionControl: true,
    maxBounds: [[6, 60], [40, 100]],
    minZoom: 4,
    maxZoom: 12,
  });

  // Dark tile layer
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // Add JEE centers
  addCenterMarkers();
  // Render list
  renderCentersList(JEE_CENTERS);
}

function makeCenterIcon(isHighlighted) {
  return L.divIcon({
    className: '',
    html: `<div style="width:${isHighlighted?14:8}px;height:${isHighlighted?14:8}px;background:${isHighlighted?'#f7941d':'#f7941d'};border-radius:50%;border:${isHighlighted?'2px solid #fff':'1.5px solid rgba(247,148,29,0.5)'};box-shadow:0 0 ${isHighlighted?'8px':'4px'} rgba(247,148,29,0.7);"></div>`,
    iconSize: [isHighlighted?14:8, isHighlighted?14:8],
    iconAnchor: [isHighlighted?7:4, isHighlighted?7:4],
  });
}

function makeUserIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="width:16px;height:16px;background:#00d4ff;border-radius:50%;border:2px solid #fff;box-shadow:0 0 12px #00d4ff,0 0 24px rgba(0,212,255,0.4);"></div>`,
    iconSize: [16, 16],
    iconAnchor: [8, 8],
  });
}

function addCenterMarkers() {
  centerMarkers = JEE_CENTERS.map(c => {
    const marker = L.marker([c.lat, c.lng], {icon: makeCenterIcon(false)});
    marker.bindPopup(`<b style="color:#f7941d">${c.name}</b><br><span style="color:#7b8abf;font-size:0.8rem">${c.state}</span>`, {
      className: 'dark-popup'
    });
    marker.addTo(map);
    marker.on('click', () => {
      // highlight in list
      document.querySelectorAll('.center-item').forEach(el => el.classList.remove('highlighted'));
      const el = document.querySelector(`[data-id="${c.id}"]`);
      if (el) { el.classList.add('highlighted'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
    });
    return {center: c, marker};
  });
}

const searchInput = document.getElementById('city-search');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResults.style.display = 'none'; return; }

  // Search districts + centers
  const distMatches = DISTRICTS.filter(d => d.name.toLowerCase().includes(q) || d.state.toLowerCase().includes(q)).slice(0, 8);
  const centerMatches = JEE_CENTERS.filter(c => c.name.toLowerCase().includes(q) || c.state.toLowerCase().includes(q)).slice(0, 5);

  const all = [
    ...centerMatches.map(c => ({name: c.name, state: c.state, lat: c.lat, lng: c.lng, isCenter: true})),
    ...distMatches.map(d => ({name: d.name, state: d.state, lat: d.lat, lng: d.lng, isCenter: false})),
  ].slice(0, 12);

  if (!all.length) { searchResults.style.display = 'none'; return; }

  searchResults.innerHTML = all.map(item => `
    <div class="search-item" onclick="selectCity(${item.lat},${item.lng},'${item.name.replace(/'/g,"\\'")}','${item.state.replace(/'/g,"\\'")}')">
      <span>${item.isCenter ? '🎯' : '📍'}</span>
      <span>${item.name}</span>
      <span class="state-tag">${item.state.substring(0,12)}</span>
    </div>
  `).join('');
  searchResults.style.display = 'block';
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-section')) searchResults.style.display = 'none';
});

function selectCity(lat, lng, name, state) {
  searchResults.style.display = 'none';
  searchInput.value = name;
  selectedCity = {lat, lng, name, state};

  document.getElementById('selected-city-section').style.display = 'block';
  document.getElementById('selected-city-name').textContent = `${name}, ${state}`;

  // Place user marker
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.marker([lat, lng], {icon: makeUserIcon(), zIndexOffset: 1000});
  userMarker.bindPopup(`<b style="color:#00d4ff">📍 ${name}</b><br><span style="color:#7b8abf;font-size:0.8rem">${state}</span>`).addTo(map);

  // Pan map
  map.setView([lat, lng], 7, {animate: true});

  // Find nearest 10
  findNearest10(lat, lng, state);
}

function clearCity() {
  selectedCity = null;
  if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
  clearLines();
  searchInput.value = '';
  document.getElementById('selected-city-section').style.display = 'none';
  renderCentersList(getFilteredCenters());
}

document.getElementById('clear-city').addEventListener('click', clearCity);

function clearLines() {
  connectionLines.forEach(l => map.removeLayer(l));
  connectionLines = [];
}

function findNearest10(lat, lng, fromState) {
  clearLines();

  const withDist = JEE_CENTERS.map(c => {
    const straight = haversine(lat, lng, c.lat, c.lng);
    const penalty = getBangladeshPenalty(fromState, c.state);
    const effective = straight + penalty;
    return {...c, distance: straight, effectiveDist: effective, hasDetour: penalty > 0};
  });

  withDist.sort((a, b) => a.effectiveDist - b.effectiveDist);
  const top10 = withDist.slice(0, 10);
  const rest = withDist.slice(10);

  // Draw lines to top 10
  top10.forEach((c, i) => {
    const color = i < 3 ? '#f7941d' : i < 6 ? '#00d4ff' : 'rgba(255,255,255,0.3)';
    const line = L.polyline([[lat, lng], [c.lat, c.lng]], {
      color, weight: i < 3 ? 2 : 1, opacity: i < 3 ? 0.8 : 0.4,
      dashArray: c.hasDetour ? '6,4' : null,
    }).addTo(map);
    connectionLines.push(line);
  });

  // Update marker icons
  centerMarkers.forEach(cm => {
    const t = top10.find(t => t.id === cm.center.id);
    if (t) {
      cm.marker.setIcon(makeCenterIcon(true));
    } else {
      cm.marker.setIcon(makeCenterIcon(false));
    }
  });

  renderCentersList(withDist, top10.map(c=>c.id));
}

function renderCentersList(centers, top10ids) {
  const section = document.getElementById('centers-section');
  const label = document.getElementById('centers-count-label');

  if (top10ids) {
    label.innerHTML = `Nearest 10 highlighted — All <span>${centers.length}</span>`;
  } else {
    label.innerHTML = `<span>${centers.length}</span> Centers`;
  }

  const html = centers.map((c, i) => {
    const isTop10 = top10ids && top10ids.includes(c.id);
    const rank = top10ids ? (top10ids.indexOf(c.id) + 1 || null) : null;
    const distStr = c.distance ? `${Math.round(c.distance)} km` : '';
    const detourNote = c.hasDetour ? `<div class="ne-warning">⚠️ +~350km (Bangladesh detour)</div>` : '';
    return `
      <div class="center-item ${isTop10?'highlighted':''}" data-id="${c.id}" onclick="flyToCenter(${c.lat},${c.lng},'${c.name.replace(/'/g,"\\'")}')">
        <div class="center-rank ${!rank?'far':''}">${rank||''}</div>
        <div class="center-info">
          <div class="center-name">${c.name}</div>
          <div class="center-state">${c.state}</div>
          ${detourNote}
        </div>
        <div class="center-dist ${!rank?'far':''}">${distStr}</div>
      </div>
    `;
  }).join('');

  section.innerHTML = html;
}

function flyToCenter(lat, lng, name) {
  map.setView([lat, lng], 10, {animate: true});
}

// ============================================================
// FILTERS
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    const filtered = getFilteredCenters();
    renderCentersList(filtered);
    // Show/hide markers
    centerMarkers.forEach(cm => {
      const show = activeFilter === 'all' || cm.center.region === activeFilter;
      if (show) { if (!map.hasLayer(cm.marker)) cm.marker.addTo(map); }
      else { if (map.hasLayer(cm.marker)) map.removeLayer(cm.marker); }
    });
  });
});

function getFilteredCenters() {
  if (activeFilter === 'all') return JEE_CENTERS;
  return JEE_CENTERS.filter(c => c.region === activeFilter);
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('load', () => {
  let progress = 0;
  const bar = document.getElementById('loading-bar');
  const interval = setInterval(() => {
    progress = Math.min(progress + Math.random() * 18, 90);
    bar.style.width = progress + '%';
  }, 200);

  setTimeout(() => {
    clearInterval(interval);
    bar.style.width = '100%';
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initMap();
    }, 300);
  }, 1400);
});
