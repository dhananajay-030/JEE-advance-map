<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEE Advanced 2026 — Exam Centre Locator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d4a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #10b981;
    --gold: #f59e0b;
    --city-dot: #00d4ff;
    --center-dot: #ff6b35;
    --selected-dot: #10b981;
    --line-color: rgba(16,185,129,0.6);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(10,14,26,0.9);
    backdrop-filter: blur(12px);
  }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
  }
  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .stats-row {
    margin-left: auto;
    display: flex;
    gap: 24px;
  }
  .stat {
    text-align: right;
  }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 81px);
    position: relative;
    z-index: 1;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-top h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  #citySearch {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px 10px 34px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #citySearch:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
  }
  #citySearch::placeholder { color: var(--muted); }

  .city-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .city-list::-webkit-scrollbar { width: 4px; }
  .city-list::-webkit-scrollbar-track { background: transparent; }
  .city-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .state-group { margin-bottom: 4px; }
  .state-header {
    padding: 6px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .state-header:hover { background: var(--surface2); }
  .state-header .chevron {
    margin-left: auto;
    transition: transform 0.2s;
    font-size: 10px;
    opacity: 0.5;
  }
  .state-header.collapsed .chevron { transform: rotate(-90deg); }
  .state-cities { display: flex; flex-direction: column; gap: 1px; }
  .state-cities.hidden { display: none; }

  .city-item {
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .city-item:hover {
    background: var(--surface2);
    border-color: var(--border);
  }
  .city-item.selected {
    background: rgba(16,185,129,0.1);
    border-color: var(--green);
    color: var(--green);
  }
  .city-dot-indicator {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--city-dot);
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--city-dot);
  }
  .city-item.selected .city-dot-indicator {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  /* RESULTS PANEL */
  .results-panel {
    border-top: 1px solid var(--border);
    padding: 12px;
    display: none;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
  }
  .results-panel.visible { display: flex; }
  .results-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .result-item {
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.15s;
  }
  .result-item:hover { border-color: var(--accent2); }
  .rank-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent2);
    width: 20px;
    flex-shrink: 0;
  }
  .result-name {
    flex: 1;
    color: var(--text);
    font-weight: 500;
    line-height: 1.3;
  }
  .result-dist {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    white-space: nowrap;
  }
  .result-state {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* MAP AREA */
  .map-area {
    position: relative;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .map-container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #indiaMap {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #indiaMap:active { cursor: grabbing; }

  /* SVG map elements */
  .state-path {
    fill: var(--surface2);
    stroke: var(--border);
    stroke-width: 0.8;
    transition: fill 0.2s;
    cursor: pointer;
  }
  .state-path:hover { fill: #1e3054; }

  /* City dots on map */
  .map-city-dot {
    cursor: pointer;
    transition: r 0.2s;
  }
  .map-city-dot circle.main {
    fill: var(--city-dot);
    opacity: 0.85;
  }
  .map-city-dot circle.pulse {
    fill: none;
    stroke: var(--city-dot);
    stroke-width: 1;
    opacity: 0;
  }
  .map-city-dot:hover circle.main { r: 5; }
  .map-city-dot.is-center circle.main {
    fill: var(--center-dot);
    r: 4.5;
  }
  .map-city-dot.is-center:hover circle.main { r: 6; }
  .map-city-dot.selected-city circle.main {
    fill: var(--green) !important;
    r: 7 !important;
    filter: drop-shadow(0 0 8px var(--green));
  }
  .map-city-dot.nearby-center circle.main {
    fill: var(--gold) !important;
    r: 6 !important;
    filter: drop-shadow(0 0 6px var(--gold));
  }

  /* Connection lines */
  .connection-line {
    stroke: var(--line-color);
    stroke-width: 1.2;
    stroke-dasharray: 4 3;
    fill: none;
    pointer-events: none;
    animation: dashMove 2s linear infinite;
  }
  @keyframes dashMove {
    to { stroke-dashoffset: -14; }
  }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    z-index: 100;
    display: none;
    max-width: 200px;
    box-shadow: 0 0 20px rgba(0,212,255,0.15);
  }
  #tooltip .t-name { font-weight: 600; color: var(--text); }
  #tooltip .t-state { color: var(--muted); font-size: 11px; margin-top: 2px; }
  #tooltip .t-type {
    margin-top: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
  }
  #tooltip .t-type.center { background: rgba(255,107,53,0.2); color: var(--accent2); }
  #tooltip .t-type.city { background: rgba(0,212,255,0.15); color: var(--accent); }
  #tooltip .t-dist { margin-top: 4px; color: var(--gold); font-family: 'Space Mono', monospace; font-size: 11px; }

  /* Legend */
  .legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(17,24,39,0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    z-index: 50;
  }
  .legend h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Controls */
  .map-controls {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 50;
  }
  .ctrl-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .ctrl-btn:hover {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Empty state */
  .empty-hint {
    padding: 20px 12px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }
  .empty-hint .icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }

  /* Pulses for selected */
  @keyframes pulse-ring {
    0% { r: 8; opacity: 0.8; }
    100% { r: 18; opacity: 0; }
  }
  .pulse-anim { animation: pulse-ring 1.5s ease-out infinite; }
</style>
</head>

</div>

// ============================================================
// MAP PROJECTION: Convert lat/lng to SVG coordinates
// ============================================================
function project(lat, lng) {
  // India bounding: lat 8-37, lng 68-97
  const minLat = 7, maxLat = 37.5;
  const minLng = 67, maxLng = 98;
  const svgMinX = 210, svgMaxX = 790;
  const svgMinY = 65, svgMaxY = 750;

  const x = svgMinX + (lng - minLng) / (maxLng - minLng) * (svgMaxX - svgMinX);
  const y = svgMaxY - (lat - minLat) / (maxLat - minLat) * (svgMaxY - svgMinY);
  return { x, y };
}

// ============================================================
// HAVERSINE DISTANCE
// ============================================================
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// BUILD SIDEBAR
// ============================================================
const stateMap = {};
CITIES.forEach(c => {
  if (!stateMap[c.state]) stateMap[c.state] = [];
  stateMap[c.state].push(c);
});

const cityList = document.getElementById('cityList');
let selectedCity = null;

function buildSidebar(filter = '') {
  cityList.innerHTML = '';
  const lf = filter.toLowerCase();
  Object.entries(stateMap).sort((a,b) => a[0].localeCompare(b[0])).forEach(([state, cities]) => {
    const filteredCities = filter ? cities.filter(c =>
      c.name.toLowerCase().includes(lf) || state.toLowerCase().includes(lf)
    ) : cities;
    if (!filteredCities.length) return;

    const group = document.createElement('div');
    group.className = 'state-group';

    const header = document.createElement('div');
    header.className = 'state-header';
    header.innerHTML = `<span>${state}</span><span class="chevron">▾</span>`;
    header.onclick = () => {
      header.classList.toggle('collapsed');
      citiesDiv.classList.toggle('hidden');
    };

    const citiesDiv = document.createElement('div');
    citiesDiv.className = 'state-cities';

    filteredCities.forEach(city => {
      const item = document.createElement('div');
      item.className = 'city-item' + (selectedCity === city ? ' selected' : '');
      item.dataset.cityName = city.name;
      item.innerHTML = `<div class="city-dot-indicator"></div>${city.name}`;
      item.onclick = () => selectCity(city);
      citiesDiv.appendChild(item);
    });

    group.appendChild(header);
    group.appendChild(citiesDiv);
    cityList.appendChild(group);
  });
}

document.getElementById('citySearch').addEventListener('input', e => {
  buildSidebar(e.target.value);
});

// Render India map
function renderMap() {
  const statesLayer = document.getElementById('statesLayer');

  // Draw a simplified India shape
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', buildIndiaPath());
  path.setAttribute('class', 'state-path');
  statesLayer.appendChild(path);

  // Draw dots for all cities
  CITIES.forEach(city => {
    const {x, y} = project(city.lat, city.lng);
    const isCenter = CENTRES.includes(city.name);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'map-city-dot' + (isCenter ? ' is-center' : ''));
    g.setAttribute('data-city', city.name);

    // Pulse circle
    const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    pulse.setAttribute('cx', x);
    pulse.setAttribute('cy', y);
    pulse.setAttribute('r', isCenter ? 7 : 5);
    pulse.setAttribute('class', 'pulse');
    g.appendChild(pulse);

    // Main dot
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', x);
    circle.setAttribute('cy', y);
    circle.setAttribute('r', isCenter ? 4 : 3);
    circle.setAttribute('class', 'main');
    g.appendChild(circle);

    g.addEventListener('mouseenter', (e) => showTooltip(e, city, isCenter));
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('click', () => selectCity(city));

    dotsLayer.appendChild(g);
  });
}

// ============================================================
// SELECT CITY
// ============================================================
function selectCity(city) {
  selectedCity = city;

  // Update sidebar highlight
  document.querySelectorAll('.city-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.cityName === city.name);
  });

  // Clear old lines
  linesLayer.innerHTML = '';

  // Reset all dots
  document.querySelectorAll('.map-city-dot').forEach(g => {
    g.classList.remove('selected-city', 'nearby-center');
  });

  // Find nearest 10 centres
  const centres = CITIES.filter(c => CENTRES.includes(c.name));
  const withDist = centres.map(c => ({
    ...c,
    dist: haversine(city.lat, city.lng, c.lat, c.lng)
  })).sort((a,b) => a.dist - b.dist).slice(0, 10);

  // Highlight selected city dot
  const selectedDot = document.querySelector(`.map-city-dot[data-city="${CSS.escape(city.name)}"]`);
  if (selectedDot) selectedDot.classList.add('selected-city');

  // Draw lines and highlight centres
  const {x: cx, y: cy} = project(city.lat, city.lng);

  withDist.forEach((centre, i) => {
    const {x: ex, y: ey} = project(centre.lat, centre.lng);

    // Line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', ex); line.setAttribute('y2', ey);
    line.setAttribute('class', 'connection-line');
    line.style.opacity = 1 - i * 0.08;
    linesLayer.appendChild(line);

    // Distance label on line midpoint
    const mx = (cx + ex) / 2, my = (cy + ey) / 2;
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', mx);
    label.setAttribute('y', my - 4);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', '#f59e0b');
    label.setAttribute('font-size', '7');
    label.setAttribute('font-family', 'Space Mono, monospace');
    label.setAttribute('pointer-events', 'none');
    label.textContent = `${Math.round(centre.dist)}km`;
    linesLayer.appendChild(label);

    // Highlight centre dot
    const dot = document.querySelector(`.map-city-dot[data-city="${CSS.escape(centre.name)}"]`);
    if (dot) dot.classList.add('nearby-center');
  });

  // Show results panel
  showResults(city, withDist);

  // Scroll city into view
  const sidebarItem = document.querySelector(`.city-item[data-city-name="${CSS.escape(city.name)}"]`);
  if (sidebarItem) sidebarItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showResults(city, centres) {
  const panel = document.getElementById('resultsPanel');
  panel.classList.add('visible');
  panel.innerHTML = `<h3>🎯 Nearest 10 Centres to ${city.name}</h3>`;

  centres.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <span class="rank-badge">#${i+1}</span>
      <div style="flex:1">
        <div class="result-name">${c.name}</div>
        <div class="result-state">${c.state}</div>
      </div>
      <span class="result-dist">${Math.round(c.dist)} km</span>
    `;
    item.onclick = () => {
      const dot = document.querySelector(`.map-city-dot[data-city="${CSS.escape(c.name)}"]`);
      if (dot) {
        const circle = dot.querySelector('circle.main');
        if (circle) {
          const rx = parseFloat(circle.getAttribute('cx'));
          const ry = parseFloat(circle.getAttribute('cy'));
          panTo(rx, ry);
        }
      }
    };
    panel.appendChild(item);
  });
}

// ============================================================
// TOOLTIP
// ============================================================
let tooltipTimeout;
function showTooltip(e, city, isCenter) {
  clearTimeout(tooltipTimeout);
  tooltip.style.display = 'block';
  tooltip.querySelector('.t-name').textContent = city.name;
  tooltip.querySelector('.t-state').textContent = city.state;
  const typeEl = tooltip.querySelector('.t-type');
  typeEl.textContent = isCenter ? 'EXAM CENTRE' : 'EXAM CITY';
  typeEl.className = 't-type ' + (isCenter ? 'center' : 'city');

  const distEl = tooltip.querySelector('.t-dist');
  if (selectedCity && selectedCity.name !== city.name) {
    const d = haversine(selectedCity.lat, selectedCity.lng, city.lat, city.lng);
    distEl.textContent = `${Math.round(d)} km from ${selectedCity.name}`;
    distEl.style.display = 'block';
  } else {
    distEl.style.display = 'none';
  }

  const rect = document.querySelector('.map-area').getBoundingClientRect();
  tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
  tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
}
function hideTooltip() {
  tooltipTimeout = setTimeout(() => { tooltip.style.display = 'none'; }, 100);
}

// ============================================================
// ZOOM/PAN
// ============================================================
let scale = 1, translateX = 0, translateY = 0;
let isPanning = false, startX, startY, startTX, startTY;

function applyTransform() {
  const g = document.querySelector('#indiaMap > g') ? svg : svg;
  svg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
  svg.style.transformOrigin = 'center center';
}

document.getElementById('zoomIn').onclick = () => { scale = Math.min(scale * 1.3, 8); applyTransform(); };
document.getElementById('zoomOut').onclick = () => { scale = Math.max(scale / 1.3, 0.5); applyTransform(); };
document.getElementById('zoomReset').onclick = () => { scale = 1; translateX = 0; translateY = 0; applyTransform(); };

svg.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isPanning = true;
  startX = e.clientX; startY = e.clientY;
  startTX = translateX; startTY = translateY;
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  translateX = startTX + (e.clientX - startX);
  translateY = startTY + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => isPanning = false);

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.85 : 1.18;
  scale = Math.min(Math.max(scale * delta, 0.5), 8);
  applyTransform();
}, { passive: false });
